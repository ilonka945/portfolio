  <!-- ===== Přihlášení ===== -->
  <section class="section section--first" id="login-section">
    <div class="container" style="max-width: 28rem;">
      <div class="reveal"><span class="title-pill">Admin</span></div>
      <form class="card contact-form reveal" id="login-form" style="--d:100ms">
        <p id="login-error" style="display:none; color:#e5484d; font-size:.875rem; font-weight:600;"></p>
        <label class="field">
          <span>E-mail</span>
          <input type="email" id="login-email" required autocomplete="username">
        </label>
        <label class="field">
          <span>Heslo</span>
          <input type="password" id="login-password" required autocomplete="current-password">
        </label>
        <button type="submit" class="btn-pill">Přihlásit se</button>
      </form>
    </div>
  </section>

  <!-- ===== Editor (viditelné až po přihlášení) ===== -->
  <section class="section section--first" id="editor-section" hidden>
    <div class="container">
      <div class="reveal" style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem;">
        <span class="title-pill">Nový článek</span>
        <button type="button" class="btn-pill btn-pill--sm ghost" id="logout-btn">Odhlásit se</button>
      </div>

      <form class="card contact-form reveal" id="post-form" style="--d:100ms">
        <p id="post-status" style="display:none; font-size:.875rem; font-weight:600;"></p>
        <input type="hidden" id="post-id" value="">

        <div class="form-row">
          <label class="field">
            <span>Nadpis</span>
            <input type="text" id="post-title" required placeholder="Název článku">
          </label>
          <label class="field">
            <span>Kategorie</span>
            <select id="post-category">
              <option>WEB</option>
              <option>FOTO</option>
              <option>VIDEO</option>
              <option>AI</option>
              <option>FREELANCE</option>
            </select>
          </label>
        </div>

        <label class="field">
          <span>Doba čtení</span>
          <input type="text" id="post-readtime" placeholder="např. 5 MIN" value="5 MIN">
        </label>

        <label class="field">
          <span>Krátký popis (zobrazí se na přehledu)</span>
          <textarea id="post-excerpt" rows="2" required placeholder="Jedna až dvě věty…"></textarea>
        </label>

        <label class="field">
          <span>Obsah článku</span>
          <textarea id="post-content" rows="12" required placeholder="Text článku. Nový odstavec = prázdný řádek."></textarea>
        </label>

        <div style="display:flex; gap: 1rem; flex-wrap: wrap;">
          <button type="submit" class="btn-pill" id="post-submit-btn">Publikovat</button>
          <button type="button" class="btn-pill ghost" id="post-cancel-btn" hidden>Zrušit úpravu</button>
        </div>
      </form>

      <div class="reveal" style="margin-top: 3rem; --d:200ms">
        <span class="title-pill">Publikované články</span>
      </div>
      <div id="admin-post-list" style="margin-top: 1.5rem;"></div>
    </div>
  </section>
