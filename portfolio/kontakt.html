  <!-- ===== Kontakt ===== -->
  <section class="section section--first cta">
    <div class="container">
      <h1 class="ghost-title cta-title cta-title--big hero-in">Pojďme spolu<br>něco vytvořit.</h1>
      <p class="cta-sub hero-in" style="--d:150ms">
        Ať už potřebujete web, fotografie, video nebo AI automatizaci — napište mi pár vět a ozvu se vám zpátky.
      </p>

      <form class="card contact-form hero-in" style="--d:300ms" action="https://formsubmit.co/imusatova77@gmail.com" method="POST">
        <input type="hidden" name="_subject" value="Nová zpráva z portfolia">
        <input type="hidden" name="_captcha" value="false">
        <input type="text" name="_honey" class="hp" tabindex="-1" autocomplete="off" aria-hidden="true">

        <div class="form-row">
          <label class="field">
            <span>Jméno</span>
            <input type="text" name="jmeno" required placeholder="Vaše jméno">
          </label>
          <label class="field">
            <span>E-mail</span>
            <input type="email" name="email" required placeholder="vas@email.cz">
          </label>
        </div>

        <label class="field">
          <span>Co potřebujete?</span>
          <select name="sluzba">
            <option>Web</option>
            <option>Fotografie</option>
            <option>Video</option>
            <option>AI automatizace</option>
            <option>Něco jiného</option>
          </select>
        </label>

        <label class="field">
          <span>Zpráva</span>
          <textarea name="zprava" rows="5" required placeholder="Napište mi pár vět o vašem projektu…"></textarea>
        </label>

        <button type="submit" class="btn-pill">Odeslat zprávu</button>
      </form>

      <div class="cta-actions hero-in" style="--d:450ms">
        <a href="#" class="btn-pill btn-pill--sm ghost">LinkedIn</a>
        <a href="#" class="btn-pill btn-pill--sm ghost">Instagram</a>
      </div>
    </div>
  </section>
